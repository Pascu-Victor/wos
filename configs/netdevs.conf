# /etc/netdevs - Network device driver assignment
# Format: <ifname> <driver>
# Drivers: wki, dhcp, linklocal, unmanaged
#
# wki        - WKI ethernet transport (exclusive; NIC removed from resource pool)
# dhcp       - DHCP client via netd
# linklocal  - IPv6 link-local address only
# unmanaged  - kernel registers the NIC but no daemon owns it

eth0 dhcp
eth1 wki
