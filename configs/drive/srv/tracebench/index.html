<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TraceBench</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101215;
      color: #ece7df;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: #101215;
    }
    main {
      display: grid;
      grid-template-columns: minmax(260px, 340px) 1fr;
      gap: 24px;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }
    aside {
      border-right: 1px solid #34383f;
      padding-right: 24px;
    }
    h1 {
      margin: 0 0 18px;
      font-size: 28px;
      font-weight: 720;
      letter-spacing: 0;
    }
    dl {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px 18px;
      margin: 0;
      font-size: 14px;
    }
    dt {
      color: #aeb7c2;
    }
    dd {
      margin: 0;
      font-variant-numeric: tabular-nums;
    }
    .bar {
      height: 12px;
      background: #272b31;
      border: 1px solid #3d434c;
      border-radius: 6px;
      overflow: hidden;
      margin: 22px 0;
    }
    .fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #49b38f, #d8c36a);
      transition: width 180ms ease;
    }
    .viewport {
      display: grid;
      place-items: center;
      min-width: 0;
    }
    img {
      max-width: 100%;
      max-height: calc(100vh - 48px);
      background: #050608;
      image-rendering: auto;
      border: 1px solid #34383f;
    }
    .muted {
      color: #aeb7c2;
      font-size: 13px;
      margin-top: 18px;
    }
    @media (max-width: 760px) {
      main {
        grid-template-columns: 1fr;
      }
      aside {
        border-right: 0;
        border-bottom: 1px solid #34383f;
        padding: 0 0 20px;
      }
      img {
        max-height: 70vh;
      }
    }
  </style>
</head>
<body>
  <main>
    <aside>
      <h1>TraceBench</h1>
      <div class="bar"><div class="fill" id="fill"></div></div>
      <dl>
        <dt>Run</dt><dd id="run">-</dd>
        <dt>Backend</dt><dd id="backend">-</dd>
        <dt>Placement</dt><dd id="placement">-</dd>
        <dt>Resolution</dt><dd id="resolution">-</dd>
        <dt>Tiles</dt><dd id="tiles">-</dd>
        <dt>Samples</dt><dd id="samples">-</dd>
        <dt>Elapsed</dt><dd id="elapsed">-</dd>
      </dl>
      <p class="muted" id="state">Waiting for a render.</p>
    </aside>
    <section class="viewport">
      <img id="preview" alt="TraceBench preview">
    </section>
  </main>
  <script>
    const ids = ["run", "backend", "placement", "resolution", "tiles", "samples", "elapsed", "state"];
    const el = Object.fromEntries(ids.map((id) => [id, document.getElementById(id)]));
    const fill = document.getElementById("fill");
    const preview = document.getElementById("preview");
    const pollIntervalMs = 1000;
    const settledPollIntervalMs = 5000;
    const completionRetryMs = 500;
    const completionMaxAttempts = 6;
    let activeRun = "";
    let settledRun = "";

    async function json(path) {
      const response = await fetch(`${path}?t=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) throw new Error(path);
      return response.json();
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function setPreview(path) {
      const src = `${path}?t=${Date.now()}`;
      return new Promise((resolve) => {
        const image = new Image();

        image.addEventListener("load", () => {
          preview.src = src;
          resolve(true);
        }, { once: true });
        image.addEventListener("error", () => {
          resolve(false);
        }, { once: true });
        image.src = src;
      });
    }

    function finalImageMayExist(status) {
      if (status.final_image_enabled === false) return false;
      const width = Number(status.width);
      const height = Number(status.height);
      const maxPixels = Number(status.final_image_max_pixels);
      if (!Number.isFinite(width) || !Number.isFinite(height) || width <= 0 || height <= 0) return true;
      if (!Number.isFinite(maxPixels)) return true;
      return width * height <= maxPixels;
    }

    async function settleCompletedRun(status) {
      const run = status.run_id || activeRun;
      const previewPath = `/srv/tracebench/runs/${run}/preview.png`;
      const finalPath = `/srv/tracebench/runs/${run}/frame_000.png`;
      const tryFinal = finalImageMayExist(status);
      let previewLoaded = false;

      for (let attempt = 0; attempt < completionMaxAttempts; attempt++) {
        if (tryFinal && await setPreview(finalPath)) {
          el.state.textContent = "Frame complete.";
          return;
        }

        if (!previewLoaded) {
          previewLoaded = await setPreview(previewPath);
        }

        if (!tryFinal || attempt + 1 === completionMaxAttempts) {
          el.state.textContent = previewLoaded || preview.currentSrc ? "Frame complete." : "Frame complete; preview unavailable.";
          return;
        }

        await sleep(completionRetryMs);
      }
    }

    async function tick() {
      try {
        const latest = await json("/srv/tracebench/runs/latest.json");
        if (latest.run_id && latest.run_id !== activeRun) {
          activeRun = latest.run_id;
          settledRun = "";
        }
        if (!activeRun) return pollIntervalMs;
        if (activeRun === settledRun) return settledPollIntervalMs;
        const status = await json(`/srv/tracebench/runs/${activeRun}/status.json`);
        const percent = status.total_tiles ? (status.tiles_done / status.total_tiles) * 100 : 0;
        fill.style.width = `${Math.max(0, Math.min(100, percent))}%`;
        el.run.textContent = status.run_id || activeRun;
        el.backend.textContent = status.backend || "-";
        el.placement.textContent = status.placement || "-";
        el.resolution.textContent = `${status.width} x ${status.height}`;
        el.tiles.textContent = `${status.tiles_done} / ${status.total_tiles}`;
        el.samples.textContent = `${status.samples_done} / ${status.total_samples}`;
        el.elapsed.textContent = `${Number(status.elapsed_seconds || 0).toFixed(2)}s`;
        el.state.textContent = status.done ? "Frame complete." : "Rendering.";
        if (status.done) {
          await settleCompletedRun(status);
          settledRun = activeRun;
          return settledPollIntervalMs;
        }

        await setPreview(`/srv/tracebench/runs/${activeRun}/preview.png`);
      } catch {
        if (activeRun && activeRun === settledRun) return settledPollIntervalMs;
        el.state.textContent = "Waiting for a render.";
      }
      return pollIntervalMs;
    }

    async function poll() {
      const started = performance.now();
      const delay = await tick();
      const elapsed = performance.now() - started;
      setTimeout(poll, Math.max(0, delay - elapsed));
    }

    poll();
  </script>
</body>
</html>
